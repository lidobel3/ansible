---

- name: Test Vault
  hosts: localhost
  gather_facts: false
  vars:
    vault_addr: "https://hcpvault.nelixair.com"
    vault_token: "{{ lookup('env','VAULT_TOKEN') }}"

  tasks:

    - name: Lire un secret Vault
      ansible.builtin.debug:
        msg: "{{ lookup('community.hashi_vault.hashi_vault',
                'secret=/data/db token={{ vault_token }} url={{ vault_addr }} field=password') }}"
