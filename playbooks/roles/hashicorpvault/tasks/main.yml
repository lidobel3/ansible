---

- name: Check du statut de Vault
  shell: vault status
  args:
    executable: /bin/bash
  register: vault_status
  ignore_errors: true

- name: Installation des pre-requis
  import_tasks: prerequis.yml
  when: vault_status.rc != 0 and primo_install_vault

- name: Déploiement et configuration de Vault
  import_tasks: deploy.yml
  when: vault_status.rc != 0  

- name: Test de l'installation de Vault
  import_tasks: check_status.yml
  when: vault_status.rc != 0
  
- name: Générer et appliquer la politique
  community.hashi_vault:
    url: "{{ vault_addr }}"
    token: "{{ vault_root_token }}"
    name: "policy-{{ app_name }}"
    # On utilise lookup pour transformer le template en texte
    rules: "{{ lookup('template', 'app-policy.hcl.j2') }}"
    state: present
