- name: Arrêter Vault existant
  become: true
  shell: pkill -f "vault server" || true
  ignore_errors: true

- name: Démarrer Vault
  shell: "nohup vault server -config={{ vault_config_path }} > /var/log/vault.log 2>&1 &"
  register: vault_init_output
  async: 45
  poll: 10
  #executable: /bin/bash

- name: Attendre Vault
  wait_for:
    host: "192.168.1.150"  # ← Ajoutez cette ligne
    port: 8200
    delay: 10
    timeout: 60

- name: Vérifier l'état de Vault
  ansible.builtin.uri:
    url: "{{ vault_addr }}/v1/sys/health"
    method: GET
    status_code: [200, 429, 472, 473, 501, 503]
    return_content: yes
  register: vault_health
  failed_when: false

- name: Extraire le statut
  set_fact:
    vault_is_initialized: "{{ vault_health.json.initialized | default(false) }}"
    vault_is_sealed: "{{ vault_health.json.sealed | default(true) }}"

- name: État initial
  debug:
    msg: "Vault - Initialisé: {{ vault_is_initialized }} | Scellé: {{ vault_is_sealed }}"

# ===== INITIALISATION =====
- name: Block d'initialisation
  block:
    - name: Initialiser Vault
      ansible.builtin.shell: |
        vault operator init \
          -address={{ vault_addr }} \
          -key-shares=5 \
          -key-threshold={{ vault_threshold }} \
          -format=json
      register: vault_init
      environment:
        VAULT_ADDR: "{{ vault_addr }}"

    - name: Créer le dossier des clés
      ansible.builtin.file:
        path: "{{ vault_keys_path }}"
        state: directory
        mode: '0700'
      #delegate_to: localhost

    - name: Sauvegarder les clés
      ansible.builtin.copy:
        content: "{{ vault_init.stdout }}"
        dest: "{{ vault_keys_file }}"
        mode: '0600'
      #delegate_to: localhost

    - name: Parser les nouvelles clés
      set_fact:
        vault_unseal_keys: "{{ (vault_init.stdout | from_json).unseal_keys_b64 }}"
        vault_root_token: "{{ (vault_init.stdout | from_json).root_token }}"
        vault_needs_unseal: true

    - name: Succès initialisation
      debug:
        msg: "✅ Vault initialisé - Clés sauvegardées dans {{ vault_keys_file }}"

  when: not vault_is_initialized
  rescue:
    - name: Erreur initialisation
      fail:
        msg: "❌ Échec de l'initialisation de Vault"

# ===== CHARGEMENT DES CLÉS EXISTANTES =====
- name: Charger les clés existantes
  block:
    - name: Vérifier l'existence du fichier
      ansible.builtin.stat:
        path: "{{ vault_keys_file }}"
      register: keys_file_stat
      delegate_to: localhost

    - name: Lire le fichier de clés
      ansible.builtin.slurp:
        src: "{{ vault_keys_file }}"
      register: keys_content
      delegate_to: localhost
      when: keys_file_stat.stat.exists

    - name: Parser les clés existantes
      set_fact:
        vault_unseal_keys: "{{ (keys_content.content | b64decode | from_json).unseal_keys_b64 }}"
        vault_root_token: "{{ (keys_content.content | b64decode | from_json).root_token }}"
      when: keys_file_stat.stat.exists

    - name: Clés introuvables
      fail:
        msg: |
          ❌ ERREUR : Vault est initialisé mais aucune clé n'est disponible !
          Fichier attendu : {{ vault_keys_file }}
          
          Solutions possibles :
          1. Fournir manuellement les clés d'unseal
          2. Réinitialiser complètement Vault (perte de données)
      when: not keys_file_stat.stat.exists

  when: vault_is_initialized and vault_is_sealed

# ===== DÉVERROUILLAGE (UNSEAL) =====
- name: Déverrouiller Vault
  block:
    - name: Appliquer les clés d'unseal ({{ vault_threshold }}/{{ vault_unseal_keys | length }})
      ansible.builtin.shell: |
        vault operator unseal -address={{ vault_addr }} "{{ item }}"
      loop: "{{ vault_unseal_keys[:vault_threshold] }}"
      register: unseal_steps
      environment:
        VAULT_ADDR: "{{ vault_addr }}"
      no_log: true

    - name: Vérifier l'unseal
      ansible.builtin.uri:
        url: "{{ vault_addr }}/v1/sys/seal-status"
        method: GET
        return_content: yes
      register: seal_status

    - name: Confirmer le déverrouillage
      assert:
        that:
          - not seal_status.json.sealed
        success_msg: "🎉 Vault est déverrouillé !"
        fail_msg: "❌ Vault est toujours scellé après unseal"

  when: vault_is_sealed
  rescue:
    - name: Erreur unseal
      debug:
        msg: "⚠️  Échec du déverrouillage - vérifiez les clés"

# ===== STATUT FINAL =====
- name: Récupérer le statut final
  ansible.builtin.shell: vault status -address={{ vault_addr }} -format=json
  register: final_vault_status
  changed_when: false
  failed_when: false
  environment:
    VAULT_ADDR: "{{ vault_addr }}"

- name: Résumé final
  debug:
    msg: |
      ╔════════════════════════════════════════╗
      ║       STATUT FINAL DE VAULT            ║
      ╚════════════════════════════════════════╝
      
      📊 Initialisé : {{ (final_vault_status.stdout | from_json).initialized }}
      🔒 Scellé     : {{ (final_vault_status.stdout | from_json).sealed }}
      📦 Version    : {{ (final_vault_status.stdout | from_json).version }}
      💾 Storage    : {{ (final_vault_status.stdout | from_json).storage_type }}
      
      {% if not (final_vault_status.stdout | from_json).sealed %}
      ✅ Vault est opérationnel !
      
      Pour vous connecter :
      export VAULT_ADDR="{{ vault_addr }}"
      export VAULT_TOKEN="{{ vault_root_token }}"
      vault status
      {% else %}
      ⚠️  Vault est toujours scellé
      {% endif %}