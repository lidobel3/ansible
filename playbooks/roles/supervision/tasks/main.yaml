---
# roles/cockpit/tasks/main.yml
- name: Installation et configuration de Cockpit
  block:
    - name: Détecter la distribution
      set_fact:
        is_debian: "{{ ansible_os_family == 'Debian' }}"
        is_redhat: "{{ ansible_os_family == 'RedHat' }}"

    - name: Installer Cockpit sur Debian/Ubuntu
      apt:
        name:
          - cockpit
          - cockpit-storaged
          - cockpit-networkmanager
          - cockpit-packagekit
        state: present
        update_cache: yes
      when: is_debian

    - name: Installer Cockpit sur RedHat/CentOS
      yum:
        name:
          - cockpit
          - cockpit-storaged
          - cockpit-networkmanager
          - cockpit-packagekit
        state: present
      when: is_redhat

    - name: Créer le répertoire de configuration
      file:
        path: /etc/cockpit
        state: directory
        mode: '0755'

    - name: Configurer Cockpit
      template:
        src: cockpit.conf.j2
        dest: /etc/cockpit/cockpit.conf
        mode: '0644'
      notify: restart cockpit

    - name: Ouvrir le port firewall (firewalld)
      firewalld:
        service: cockpit
        permanent: yes
        state: enabled
        immediate: yes
      when: 
        - is_redhat
        - ansible_facts.services['firewalld.service'] is defined
        - ansible_facts.services['firewalld.service'].state == 'running'
      ignore_errors: yes

    - name: Ouvrir le port firewall (ufw)
      ufw:
        rule: allow
        port: '9090'
        proto: tcp
      when:
        - is_debian
        - ansible_facts.services['ufw.service'] is defined
      ignore_errors: yes

    - name: Activer et démarrer le service Cockpit
      systemd:
        name: cockpit.socket
        enabled: yes
        state: started

    - name: Vérifier que Cockpit écoute sur le port 9090
      wait_for:
        port: 9090
        delay: 5
        timeout: 30

  rescue:
    - name: Afficher l'erreur
      debug:
        msg: "Erreur lors de l'installation de Cockpit : {{ ansible_failed_result }}"