---
- name: Déployer service Node Exporter
  template:
    src: node_exporter.service.j2
    dest: "/etc/systemd/system/node_exporter.service"
    mode: '0644'
  notify: restart node_exporter

- name: Activer Node Exporter
  systemd:
    name: node_exporter
    daemon_reload: yes
    enabled: "{{ node_exporter_enabled }}"
    state: "{{ 'started' if node_exporter_enabled else 'stopped' }}"
