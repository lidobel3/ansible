# tasks file for promotheus
- name: Créer le groupe système prometheus
  group:
    name: "{{ prometheus_group }}"
    system: true
    state: present

- name: Créer l'utilisateur système prometheus
  user:
    name: "{{ prometheus_user }}"
    group: "{{ prometheus_group }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: false

- name: Créer les répertoires Prometheus
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_group }}"
    mode: '0755'
  loop:
    - "{{ prometheus_dir }}"
    - "{{ prometheus_data_dir }}"
    - "{{ prometheus_dir }}/rules"