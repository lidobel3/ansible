---
# tasks file for alertmgr
- name: Créer les répertoires Alertmanager
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_group }}"
    mode: '0755'
  loop:
    - "{{ alertmanager_dir }}"
    - "{{ alertmanager_data_dir }}"

- name: Télécharger Alertmanager
  get_url:
    url: "https://github.com/prometheus/alertmanager/releases/download/v{{ alertmanager_version }}/alertmanager-{{ alertmanager_version }}.linux-amd64.tar.gz"
    dest: "/tmp/alertmanager.tar.gz"
    mode: '0644'

- name: Extraire Alertmanager
  unarchive:
    src: "/tmp/alertmanager.tar.gz"
    dest: "/tmp/"
    remote_src: true

- name: Copier les binaires Alertmanager
  copy:
    src: "/tmp/alertmanager-{{ alertmanager_version }}.linux-amd64/{{ item }}"
    dest: "{{ alertmanager_dir }}/{{ item }}"
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_group }}"
    mode: '0755'
    remote_src: true
  loop:
    - alertmanager
    - amtool

- name: Déployer la configuration Alertmanager
  template:
    src: alertmanager.yml.j2
    dest: "{{ alertmanager_dir }}/alertmanager.yml"
    owner: "{{ prometheus_user }}"
    group: "{{ prometheus_group }}"
    mode: '0644'
  notify: restart alertmanager

- name: Créer le service systemd Alertmanager
  template:
    src: alertmanager.service.j2
    dest: /etc/systemd/system/alertmanager.service
    mode: '0644'
  notify: restart alertmanager