- name: Deploy Bitwarden
  community.docker.docker_compose:
    # project_src: "{{ bitwarden_data_dir }}"
    project_src: files/docker-compose.yaml
  notify: Restart Bitwarden
  tags: run

- name: Wait for Bitwarden
  uri:
    url: "http://localhost:{{ bitwarden_port }}"
    status_code: 200
  register: bw
  retries: 10
  delay: 5
  until: bw.status == 200
