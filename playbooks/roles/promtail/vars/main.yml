---
# Version du binaire à installer
promtail_version: "2.9.4"

# URL de téléchargement (on utilise la variable de version pour plus de flexibilité)
promtail_download_url: "https://github.com/grafana/loki/releases/download/v{{ promtail_version }}/promtail-linux-amd64.zip"

# L'IP ou le DNS de ton serveur Loki (à adapter selon ton infra)
# Tu peux aussi utiliser hostvars['monitoring']['ansible_default_ipv4']['address']
loki_server_ip: "{{ hostvars['gcp']['ansible_default_ipv4']['address'] }}"

# Liste des fichiers à surveiller par défaut
promtail_log_path: "/var/log/*.log"