---
- name: Création du groupe système promtail
  group:
    name: promtail
    system: yes

- name: Création de l'utilisateur promtail
  user:
    name: promtail
    group: promtail
    system: yes
    shell: /sbin/nologin

- name: Téléchargement du binaire Promtail
  get_url:
    url: "https://github.com/grafana/loki/releases/download/v2.9.4/promtail-linux-amd64.zip"
    dest: "/tmp/promtail.zip"

- name: Installation de unzip
  apt:
    name: unzip
    state: present

- name: Décompression du binaire
  unarchive:
    src: "/tmp/promtail.zip"
    dest: "/usr/local/bin/"
    remote_src: yes
    creates: "/usr/local/bin/promtail-linux-amd64"

- name: Renommer le binaire et fixer les droits
  copy:
    src: "/usr/local/bin/promtail-linux-amd64"
    dest: "/usr/local/bin/promtail"
    mode: '0755'
    remote_src: yes

- name: Création du dossier de config
  file:
    path: /etc/promtail
    state: directory
    owner: promtail

- name: Déploiement de la configuration
  template:
    src: promtail-config.yaml.j2
    dest: /etc/promtail/config.yml
  notify: restart promtail

- name: Création du service Systemd
  copy:
    dest: /etc/systemd/system/promtail.service
    content: |
      [Unit]
      Description=Promtail service
      After=network.target

      [Service]
      Type=simple
      User=root
      ExecStart=/usr/local/bin/promtail -config.file=/etc/promtail/config.yml
      Restart=on-failure

      [Install]
      WantedBy=multi-user.target
  notify: restart promtail

- name: Lancement du service
  systemd:
    name: promtail
    state: started
    enabled: yes
    daemon_reload: yes