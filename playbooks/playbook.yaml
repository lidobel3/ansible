# Exemple de playbook utilisant le rôle
# playbook_cockpit.yml
- name: Installer Cockpit sur les serveurs
  hosts: all
  become: true
  vars:
    cockpit_idle_timeout: "3600"  # 1 heure
    cockpit_password_auth: "true"
  roles:
    - supervision
  post_tasks:
    - name: Afficher l'URL d'accès
      debug:
        msg: "Cockpit est accessible sur https://{{ ansible_default_ipv4.address }}:9090"

- hosts: frontend
  roles:
    - frontend

- hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Installer les collections
      ansible.builtin.command:
        # Assure-toi d'avoir {{ item }} ici et non le nom en dur !
        cmd: "ansible-galaxy collection install {{ item }}"
      loop:
        - community.docker
        - community.hashi_vault
        
- hosts: docker
  roles:
    - docker
  become: true

- hosts: docker
  become: true
  tags: bitwarden
  tasks:
    - import_role:
        name: bitwarden
      when: install_bitwarden

- name: Installer et configurer HashiCorp Vault
  hosts: vault_servers
  become: true
  roles:
    - hashicorpvault
  tags: vault

- hosts: bdd
  roles:
    - bdd
  become: true