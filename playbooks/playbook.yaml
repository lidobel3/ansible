# Exemple de playbook utilisant le rôle
# playbook_cockpit.yml
- name: Installer Cockpit sur les serveurs
  hosts: all
  become: yes
  
  vars:
    cockpit_idle_timeout: "3600"  # 1 heure
    cockpit_password_auth: "true"
  
  roles:
    - supervision
  
  post_tasks:
    - name: Afficher l'URL d'accès
      debug:
        msg: "Cockpit est accessible sur https://{{ ansible_default_ipv4.address }}:9090"

- hosts: frontend
  roles:
    - frontend

# - hosts: middle
#   roles:
#     - middle
- hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Installer la collection community.docker
      ansible.builtin.command:
        cmd: ansible-galaxy collection install community.docker
        
- hosts: docker
  roles:
    - docker
  become: true

# - hosts: docker
#   roles:
#     - bitwarden
#   become: true
#   tags: bitwarden

- hosts: docker
  become: true
  tags: bitwarden
  tasks:
    - import_role:
        name: bitwarden
      when: install_bitwarden

- hosts: bdd
  roles:
    - bdd
  become: true